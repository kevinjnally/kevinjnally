<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin J Nally | Photography</title>
    <link rel="icon" type="image/png" href="images/favicon.png"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Kevin J Nally</h1>
        <nav>
            <a href="index.html">About</a>
            <a href="structures.html">Structures</a>
            <a href="photography.html">Photography</a>
            <a href="updates.html">Updates</a>
            <a href="resume.pdf" target="_blank">Resume</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="container">
        <section id="photography">
            <h2 style="border-bottom: none; margin-bottom: 10px;">Photography</h2>
            
            <div class="filter-nav">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="architecture">Architecture</button>
                <button class="filter-btn" data-filter="portraits">Portraits</button>
                <button class="filter-btn" data-filter="street">Street</button>
            </div>

            <div class="masonry-grid" id="photo-gallery">
                
                <div class="photo-item" data-category="nature">
                    <img src="images/olympicforest.jpg" alt="Olympic National Park">
                    <div class="caption-overlay">Olympic National Park
                        Fujifilm X-T30</div>
                </div>

                <div class="photo-item" data-category="architecture">
                    <img src="https://via.placeholder.com/600x900.png?text=Architecture+1" alt="Architecture">
                    <div class="caption-overlay">Structural details in downtown Philadelphia</div>
                </div>

                <div class="photo-item" data-category="street">
                    <img src="https://via.placeholder.com/600x600.png?text=Street+1" alt="Street">
                    <div class="caption-overlay">Morning commute, Shinjuku</div>
                </div>
                </div>
        </section>
    </main>

    <script>
        const filterBtns = document.querySelectorAll('.filter-btn');
        const photoItems = document.querySelectorAll('.photo-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove the solid black 'active' class from all buttons
                filterBtns.forEach(b => b.classList.remove('active'));
                // Add the solid black 'active' class to the clicked button
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');

                // Loop through all photos to hide or show them
                photoItems.forEach(item => {
                    if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                        item.style.display = 'block'; // Show photo
                    } else {
                        item.style.display = 'none';  // Hide photo
                    }
                });
            });
        });
    </script>

</body>
</html>
